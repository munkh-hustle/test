<!DOCTYPE html>
<html>
  <head>
    <title>360 Degree Panorama Viewer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- 
        The 'src' attribute should point to your equirectangular image.
        The 'rotation' attribute adjusts the initial viewing angle.
      -->
      <a-sky src="1-1.jpg" rotation="0 -90 0"></a-sky>
    </a-scene>
  </body>
</html>
